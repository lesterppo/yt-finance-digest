name: YouTube Gem Daily Digest

on:
  schedule:
    - cron: "0 2 * * *"  # 10:00 HKT = 02:00 UTC — adjust for your timezone
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install gemini-webapi browser-cookie3 loguru

      - name: Setup gemini-cli
        run: |
          mkdir -p ~/.local/bin
          cp gemini.py ~/.local/bin/gemini-cli
          chmod +x ~/.local/bin/gemini-cli

      - name: Setup auth
        env:
          GEMINI_SID: ${{ secrets.GEMINI_SID }}
          GEMINI_TS: ${{ secrets.GEMINI_TS }}
        run: |
          mkdir -p ~/.gemini-cli
          printf '{"__Secure-1PSID":"%s","__Secure-1PSIDTS":"%s"}\n' \
            "$GEMINI_SID" "$GEMINI_TS" > ~/.gemini-cli/auth.json

      - name: Run digest
        env:
          YT_GEM_SMTP_USER: ${{ secrets.YT_GEM_SMTP_USER }}
          YT_GEM_SMTP_PASS: ${{ secrets.YT_GEM_SMTP_PASS }}
          YT_GEM_RECIPIENT: ${{ secrets.YT_GEM_RECIPIENT }}
          YT_GEM_GEMINI_GEM_ID: ${{ secrets.YT_GEM_GEMINI_GEM_ID }}
        run: python yt_gem_daily.py
